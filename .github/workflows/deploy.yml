name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  RUST_VERSION: "1.95"

jobs:
  deploy:
    name: Deploy to Pi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vaultkeeper-server:deploy-${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/vaultkeeper-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy deploy artifacts to Pi
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_PORT || 22 }}
          source: "deploy/compose/docker-compose.prod.yml"
          target: "/opt/vaultkeeper/"
          strip_components: 2

      - name: Deploy on the Pi
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG: deploy-${{ github.sha }}
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_PORT || 22 }}
          envs: DOCKER_USERNAME,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/vaultkeeper

            # Patch .env with this run's image coordinates. JWT_SECRET stays
            # whatever the operator set during initial Pi setup; we never
            # touch it here.
            touch .env
            chmod 600 .env
            grep -v '^DOCKER_USERNAME=' .env > .env.tmp || true
            grep -v '^IMAGE_TAG=' .env.tmp > .env || true
            rm -f .env.tmp
            printf "DOCKER_USERNAME=%s\n" "$DOCKER_USERNAME" >> .env
            printf "IMAGE_TAG=%s\n" "$IMAGE_TAG" >> .env

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            # Wait for the container's own healthcheck to flip to healthy.
            for i in $(seq 1 30); do
              status=$(docker inspect --format '{{.State.Health.Status}}' vaultkeeper-sync 2>/dev/null || echo starting)
              if [ "$status" = "healthy" ]; then
                echo "vaultkeeper-sync is healthy"
                exit 0
              fi
              sleep 2
            done

            echo "vaultkeeper-sync did not become healthy in 60s — recent logs:"
            docker compose -f docker-compose.prod.yml logs --tail 80 sync-server
            exit 1
